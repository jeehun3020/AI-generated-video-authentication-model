seed: 42

paths:
  processed_faces_dir: data/processed/faces_ultraquick
  manifests_dir: data/manifests_ultraquick
  checkpoints_dir: outputs/checkpoints_ultraquick_fft
  eval_dir: outputs/eval
  inference_dir: outputs/inference

task:
  mode: multiclass
  classes: [real, generated, deepfake]
  positive_classes: [generated, deepfake]

datasets:
  ucf101:
    enabled: true
    parser: ucf101
    root: UCF101-Action Recognition
    class_name: real
    max_samples: 120

  voxceleb2:
    enabled: false
    parser: voxceleb2
    root: VoxCeleb2/vox2_dev_mp4
    class_name: real

  stylegan:
    enabled: true
    parser: stylegan
    root: Final Dataset/Fake
    class_name: generated
    max_samples: 500

  faceforensicspp:
    enabled: true
    parser: faceforensicspp
    root: FaceForensics++_C23
    class_name: deepfake
    include_original_sequences: false
    max_samples: 120

  celebdf:
    enabled: true
    parser: celebdf
    root: Celeb_V2
    class_name: deepfake
    include_real: false
    max_samples: 500

split:
  val_ratio: 0.15
  test_ratio: 0.15
  group_priority: [original_id, identity_id, source_id, video_id]

preprocess:
  target_fps: 1
  max_frames_per_video: 4
  image_size: 224
  fallback_to_full_frame: true
  detector:
    name: none
    device: cpu

training:
  device: auto
  backbone: efficientnet_b0
  pretrained: true
  dropout: 0.35
  input_representation: fft
  grad_clip_norm: 1.0
  batch_size: 32
  num_workers: 2
  epochs: 12
  lr: 0.0001
  weight_decay: 0.0005
  amp: true
  monitor: f1
  loss:
    label_smoothing: 0.08
    use_class_weights: true
  sampling:
    balanced_sampler: true
  early_stopping:
    patience: 3
    min_delta: 0.001
  augmentation:
    hflip_p: 0.5
    color_jitter: false
    random_erasing: true
    random_erasing_p: 0.3

inference:
  batch_size: 32
  aggregation: confidence_mean
  input_representation: fft
  min_confidence: 0.55
  topk_ratio: 0.5
  conf_power: 2.0

evaluation:
  video_aggregation: confidence_mean
  input_representation: fft
  topk_ratio: 0.5
  conf_power: 2.0
