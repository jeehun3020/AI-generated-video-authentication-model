seed: 42

paths:
  processed_faces_dir: data/processed/faces_ultraquick
  manifests_dir: data/manifests_ultraquick
  checkpoints_dir: outputs/checkpoints_ultraquick
  temporal_checkpoints_dir: outputs/checkpoints_temporal_ultraquick_rgb
  eval_dir: outputs/eval
  inference_dir: outputs/inference

task:
  mode: multiclass
  classes: [real, generated, deepfake]
  positive_classes: [generated, deepfake]

preprocess:
  target_fps: 1
  max_frames_per_video: 4
  image_size: 224
  fallback_to_full_frame: true
  detector:
    name: none
    device: cpu

training:
  device: auto
  backbone: efficientnet_b0
  pretrained: true
  dropout: 0.35
  input_representation: rgb
  grad_clip_norm: 1.0
  batch_size: 32
  num_workers: 2
  epochs: 12
  lr: 0.0001
  weight_decay: 0.0005
  amp: true
  monitor: f1
  loss:
    label_smoothing: 0.08
    use_class_weights: true
  sampling:
    balanced_sampler: true
  early_stopping:
    patience: 3
    min_delta: 0.001
  augmentation:
    hflip_p: 0.5
    color_jitter: true
    color_jitter_strength: 0.15
    random_erasing: true
    random_erasing_p: 0.3

inference:
  batch_size: 32
  aggregation: confidence_mean
  input_representation: rgb
  min_confidence: 0.55
  topk_ratio: 0.5
  conf_power: 2.0

evaluation:
  video_aggregation: confidence_mean
  input_representation: rgb
  topk_ratio: 0.5
  conf_power: 2.0

ensemble:
  frame_weight: 0.4
  temporal_weight: 0.4
  freq_weight: 0.2
  frame_aggregation: confidence_mean
  frame_input_representation: rgb
  freq_input_representation: fft
  min_confidence: 0.55
  topk_ratio: 0.5
  conf_power: 2.0
  decision_policy: argmax
  fake_threshold: 0.45

temporal:
  input_representation: rgb
  dataset:
    sequence_length: 8
    sampling: random
    min_frames_per_video: 1
    frame_mode: rgb
  model:
    backbone: efficientnet_b0
    pretrained: true
    hidden_size: 256
    num_layers: 1
    bidirectional: true
    dropout: 0.3
    freeze_backbone: false
  training:
    device: auto
    batch_size: 8
    num_workers: 2
    epochs: 8
    lr: 0.0001
    weight_decay: 0.0005
    amp: true
    monitor: f1
    grad_clip_norm: 1.0
    loss:
      label_smoothing: 0.05
      use_class_weights: true
    sampling:
      balanced_sampler: true
    early_stopping:
      patience: 2
      min_delta: 0.001
    augmentation:
      hflip_p: 0.5
      color_jitter: true
      color_jitter_strength: 0.1
      random_erasing: true
      random_erasing_p: 0.2
