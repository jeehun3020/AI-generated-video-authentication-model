seed: 44

paths:
  processed_faces_dir: data/processed/faces_real_hardnegative_eval_44
  manifests_dir: data/manifests_real_hardnegative_eval_44
  checkpoints_dir: outputs/checkpoints_shorts_binary_holdout
  eval_dir: outputs/eval
  inference_dir: outputs/inference

task:
  mode: binary
  classes: [real, generated]
  positive_classes: [generated]

datasets:
  youtube_shorts_real_hardnegative:
    enabled: true
    parser: youtube_shorts
    root: data/raw/youtube_shorts_real_hardnegative/real
    class_name: real

split:
  val_ratio: 0.0
  test_ratio: 0.5
  group_priority: [source_id, original_id, identity_id, video_id]

preprocess:
  target_fps: 1
  max_frames_per_video: 6
  image_size: 224
  fallback_to_full_frame: true
  detector:
    name: none
    device: cpu

training:
  device: auto
  backbone: efficientnet_b0
  pretrained: true
  dropout: 0.4
  input_representation: rgb
  grad_clip_norm: 1.0
  batch_size: 32
  num_workers: 0
  epochs: 1
  lr: 0.0001
  weight_decay: 0.0005
  amp: false
  monitor: f1
  loss:
    label_smoothing: 0.05
    use_class_weights: false
  sampling:
    balanced_sampler: false
  early_stopping:
    patience: 1
    min_delta: 0.0
  augmentation:
    hflip_p: 0.0
    color_jitter: false
    random_erasing: false

inference:
  batch_size: 32
  aggregation: confidence_mean
  input_representation: rgb
  min_confidence: 0.55
  topk_ratio: 0.5
  conf_power: 2.0

evaluation:
  video_aggregation: confidence_mean
  input_representation: rgb
  topk_ratio: 0.5
  conf_power: 2.0
